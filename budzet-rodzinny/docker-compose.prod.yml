services:
  app:
    build: .
    container_name: budzet-rodzinny-app
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:14.4
    container_name: budzet-rodzinny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: budzet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-budzet-prod-change-me}
      POSTGRES_DB: budzet_rodzinny
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budzet -d budzet_rodzinny"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
