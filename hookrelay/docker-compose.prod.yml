services:
  app:
    build:
      context: .
      target: production
    container_name: hookrelay-app
    ports:
      - "127.0.0.1:3001:8080"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:14.4
    container_name: hookrelay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hookrelay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hookrelay-prod-change-me}
      POSTGRES_DB: hookrelay
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookrelay -d hookrelay"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.4.0
    container_name: hookrelay-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  postgres-data:
  redis-data:
