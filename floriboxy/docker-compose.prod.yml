services:
  app:
    build: .
    container_name: floriboxy-app
    ports:
      - "127.0.0.1:5000:5000"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/static/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:14.4
    container_name: floriboxy-postgres
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: floriboxy
      POSTGRES_DB: floriboxy
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floriboxy -d floriboxy"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  uploads:
